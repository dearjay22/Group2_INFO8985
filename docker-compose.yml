version: '3.8'
services:

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: obsshop
      POSTGRES_USER: obsshop_user
      POSTGRES_PASSWORD: obsshop_pass
    ports:
      - "5432:5432"

  discovery-service:
    build: ./backend/discovery-service
    ports:
      - "8761:8761"

  api-gateway:
    build: ./backend/api-gateway
    depends_on:
      - discovery-service
      - product-service
      - order-service
    ports:
      - "8080:8080"

  product-service:
    build: ./backend/product-service
    depends_on:
      - db
      - discovery-service
    ports:
      - "8081:8081"

  order-service:
    build: ./backend/order-service
    depends_on:
      - db
      - discovery-service
    ports:
      - "8082:8082"

  shell-app:
    build: ./frontend/shell-app
    ports:
      - "3000:80"
    depends_on:
      - api-gateway

  products-mf:
    build: ./frontend/products-mf
    ports:
      - "3001:80"
    depends_on:
      - api-gateway
  prometheus:
    image: prom/prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana
    ports:
      - "3002:3000"

  signoz:
    image: signoz/signoz:latest
    ports:
      - "3301:3301"