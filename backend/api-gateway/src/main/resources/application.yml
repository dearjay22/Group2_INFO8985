server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true   # automatically routes using Eureka

      routes:
        - id: product-service
          uri: http://product-service:8081
          predicates:
            - Path=/products/**

        - id: order-service
          uri: http://order-service:8082
          predicates:
            - Path=/orders/**

eureka:
  client:
    service-url:
      defaultZone: http://discovery-service:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0

otel:
  exporter:
    otlp:
      endpoint: http://signoz-otel-collector:4317